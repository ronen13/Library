<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="ספריית האינטרנט של INNO-TECH — כלים, אתרים ומשאבים טכנולוגיים בעברית" />
  <meta name="theme-color" content="#0d0f1a" />
  <title>INNO-TECH | ספריית האינטרנט</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <a href="https://www.youtube.com/@inno-tech" target="_blank" class="logo-wrap">
        <svg class="logo-svg" viewBox="0 0 140 80" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="wg1" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#6c63ff"/>
              <stop offset="100%" stop-color="#00d4d8"/>
            </linearGradient>
          </defs>
          <path d="M8 62 Q38 18 70 40 Q102 62 132 18" stroke="url(#wg1)" stroke-width="4.5" fill="none" stroke-linecap="round"/>
          <path d="M8 53 Q38 10 70 30 Q102 53 132 8" stroke="url(#wg1)" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.65"/>
          <path d="M8 71 Q38 28 70 50 Q102 71 132 28" stroke="url(#wg1)" stroke-width="2.2" fill="none" stroke-linecap="round" opacity="0.4"/>
          <path d="M8 44 Q38 2 70 22 Q102 44 132 -1" stroke="url(#wg1)" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.25"/>
        </svg>
        <div class="brand-text">
          <span class="brand-name">INNO-TECH</span>
          <span class="brand-tagline">START HERE</span>
        </div>
      </a>

      <nav class="header-nav">
        <a href="https://www.youtube.com/@inno-tech" target="_blank" class="yt-btn">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
          הערוץ שלנו
        </a>
      </nav>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-bg-grid"></div>
    <div class="hero-inner">
      <h1 class="hero-title">ספריית<br/><span class="gradient-text">האינטרנט</span></h1>
      <p class="hero-sub">כל הכלים, האתרים והמשאבים שאתה צריך — במקום אחד</p>
      <div class="search-wrap">
        <div class="search-box">
          <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" id="searchInput" placeholder="חפש אתר, כלי או נושא..." autocomplete="off" />
          <button class="search-clear" id="clearBtn" onclick="clearSearch()" style="display:none">✕</button>
        </div>
      </div>
    </div>
  </section>

  <!-- CATEGORIES -->
  <section class="cats-section">
    <div class="container">
      <div class="cats-scroll">
        <button class="cat-btn active" data-cat="all">
          <span class="cat-icon">🌐</span> הכל
        </button>
        <button class="cat-btn" data-cat="ai">
          <span class="cat-icon">🤖</span> בינה מלאכותית
        </button>
        <button class="cat-btn" data-cat="dev">
          <span class="cat-icon">💻</span> פיתוח
        </button>
        <button class="cat-btn" data-cat="news">
          <span class="cat-icon">📰</span> חדשות טק
        </button>
        <button class="cat-btn" data-cat="tools">
          <span class="cat-icon">⚡</span> כלים
        </button>
        <button class="cat-btn" data-cat="learn">
          <span class="cat-icon">🎓</span> למידה
        </button>
        <button class="cat-btn" data-cat="design">
          <span class="cat-icon">🎨</span> עיצוב
        </button>
        <button class="cat-btn" data-cat="cloud">
          <span class="cat-icon">☁️</span> ענן ו-DevOps
        </button>
      </div>
    </div>
  </section>

  <!-- RESULTS INFO -->
  <div class="container">
    <div class="results-bar" id="resultsBar">
      <span id="resultsCount">מציג 30 אתרים</span>
    </div>
  </div>

  <!-- CARDS GRID -->
  <main class="container">
    <div class="cards-grid" id="cardsGrid"></div>
    <div class="no-results" id="noResults" style="display:none">
      <div class="no-results-icon">🔍</div>
      <p>לא נמצאו תוצאות עבור החיפוש שלך</p>
      <button onclick="clearSearch()">נקה חיפוש</button>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="container">
      <div class="footer-inner">
        <div class="footer-brand">
          <span class="brand-name small">INNO-TECH</span>
          <span class="footer-tagline">ספריית האינטרנט</span>
        </div>
        <div class="footer-links">
          <a href="https://www.youtube.com/@inno-tech" target="_blank">ערוץ יוטיוב</a>
        </div>
        <p class="footer-copy">© 2025 INNO-TECH. כל הזכויות שמורות.</p>
      </div>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>

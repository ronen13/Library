<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="ספריית הסרטונים של INNO-TECH — כל התוכן במקום אחד" />
  <meta name="theme-color" content="#0d0f1a" />
  <title>INNO-TECH | ספריית הסרטונים</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <a href="https://www.youtube.com/@inno-tech" target="_blank" class="logo-wrap">
        <svg class="logo-svg" viewBox="0 0 140 80" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="wg1" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#ff4d5a"/>
              <stop offset="100%" stop-color="#c0392b"/>
            </linearGradient>
          </defs>
          <path d="M8 62 Q38 18 70 40 Q102 62 132 18" stroke="url(#wg1)" stroke-width="4.5" fill="none" stroke-linecap="round"/>
          <path d="M8 53 Q38 10 70 30 Q102 53 132 8" stroke="url(#wg1)" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.65"/>
          <path d="M8 71 Q38 28 70 50 Q102 71 132 28" stroke="url(#wg1)" stroke-width="2.2" fill="none" stroke-linecap="round" opacity="0.4"/>
        </svg>
        <div class="brand-text">
          <span class="brand-name">INNO-TECH</span>
          <span class="brand-tagline">START HERE</span>
        </div>
      </a>
      <a href="https://www.youtube.com/@inno-tech" target="_blank" class="yt-btn">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor">
          <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
        </svg>
        הערוץ שלנו
      </a>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-grid"></div>
    <div class="hero-inner">
      <h1 class="hero-title">ספריית<br/><span class="gradient-text">הסרטונים</span></h1>
      <p class="hero-sub">כל התוכן של INNO-TECH — חפש, סנן וצפה</p>

      <div class="search-wrap">
        <div class="search-box">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input type="text" id="searchInput" placeholder="חפש סרטון..." autocomplete="off" />
          <button id="clearBtn" class="clear-btn" onclick="clearSearch()" style="display:none">✕</button>
        </div>
      </div>
    </div>
  </section>

  <!-- STATS BAR -->
  <div class="stats-bar" id="statsBar" style="display:none">
    <div class="container">
      <div class="stats-inner">
        <span class="stat"><span id="statVideos">0</span> סרטונים</span>
        <span class="stat-divider">·</span>
        <span class="stat"><span id="statViews">0</span> צפיות</span>
        <span class="stat-divider">·</span>
        <span class="stat"><span id="statSubs">0</span> מנויים</span>
      </div>
    </div>
  </div>

  <!-- SORT / FILTER -->
  <div class="toolbar">
    <div class="container">
      <div class="toolbar-inner">
        <div class="sort-group">
          <label for="sortSelect">מיין:</label>
          <select id="sortSelect" onchange="applyFilters()">
            <option value="date">חדש לישן</option>
            <option value="date-asc">ישן לחדש</option>
            <option value="views">הכי נצפה</option>
            <option value="title">לפי שם</option>
          </select>
        </div>
        <span class="results-count" id="resultsCount"></span>
      </div>
    </div>
  </div>

  <!-- LOADING -->
  <div class="loading-wrap" id="loadingWrap">
    <div class="spinner"></div>
    <p>טוען סרטונים...</p>
  </div>

  <!-- ERROR -->
  <div class="error-wrap" id="errorWrap" style="display:none">
    <div class="error-icon">⚠️</div>
    <p id="errorMsg">אירעה שגיאה בטעינת הסרטונים</p>
    <button onclick="loadVideos()">נסה שוב</button>
  </div>

  <!-- GRID -->
  <main class="container">
    <div class="videos-grid" id="videosGrid"></div>
    <div class="no-results" id="noResults" style="display:none">
      <div class="no-results-icon">🔍</div>
      <p>לא נמצאו סרטונים תואמים</p>
      <button onclick="clearSearch()">נקה חיפוש</button>
    </div>
    <div class="load-more-wrap" id="loadMoreWrap" style="display:none">
      <button class="load-more-btn" id="loadMoreBtn" onclick="loadMore()">טען עוד סרטונים</button>
    </div>
  </main>

  <!-- MODAL -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-video">
        <iframe id="modalIframe" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
      </div>
      <div class="modal-info">
        <h2 id="modalTitle"></h2>
        <div class="modal-meta">
          <span id="modalDate"></span>
          <span>·</span>
          <span id="modalViews"></span>
        </div>
        <p id="modalDesc"></p>
        <a id="modalYtLink" href="#" target="_blank" class="yt-watch-btn">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
            <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
          </svg>
          צפה ביוטיוב
        </a>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="container">
      <p class="footer-copy">© 2025 INNO-TECH · <a href="https://www.youtube.com/@inno-tech" target="_blank">YouTube</a></p>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
